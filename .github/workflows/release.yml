name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version without leading v (e.g. 1.0.0)'
        required: true
        type: string
      skip_node20:
        description: 'Skip the -node20 tag (emergency only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preflight:
    name: Pre-flight guards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate actor and branch
        env:
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          ALLOWLIST: ${{ vars.RELEASE_ALLOWLIST }}
        run: |
          set -euo pipefail
          if [[ "$REF" != "refs/heads/main" ]]; then
            echo "::error::release.yml must be dispatched from the 'main' branch (got $REF)."
            exit 1
          fi
          if [[ -n "${ALLOWLIST:-}" ]]; then
            if ! echo ",$ALLOWLIST," | grep -q ",$ACTOR,"; then
              echo "::error::Actor '$ACTOR' is not in RELEASE_ALLOWLIST."
              exit 1
            fi
          else
            echo "::warning::RELEASE_ALLOWLIST variable is unset; skipping actor check."
          fi

      - name: Validate version input
        id: validate
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::'version' must be MAJOR.MINOR.PATCH (got '$VERSION')."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists."
            exit 1
          fi
          if ! grep -qE "^## \[?v?$VERSION\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no section for $VERSION."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify dist matches a fresh build on main
        run: |
          npm ci
          npm run build
          git diff --exit-code dist/

      - name: Verify main ↔ main-node20 source lockstep
        run: |
          set -euo pipefail
          git fetch origin main-node20:main-node20
          if ! git diff --quiet main main-node20 -- \
              src/ __tests__/ package.json package-lock.json tsconfig.json; then
            echo "::error::main and main-node20 diverge outside action.yml/dist/. Fix lockstep before releasing."
            git diff --stat main main-node20 -- src/ __tests__/ package.json package-lock.json tsconfig.json
            exit 1
          fi

  build-main:
    name: Build (main)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code dist/

  build-node20:
    name: Build (main-node20)
    needs: preflight
    if: ${{ !inputs.skip_node20 }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main-node20
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
      - run: git diff --exit-code dist/

  tag-and-push:
    name: Tag and push
    needs: [preflight, build-main, build-node20]
    if: ${{ always() && needs.preflight.result == 'success' && needs.build-main.result == 'success' && (inputs.skip_node20 || needs.build-node20.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git identity
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Tag main
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin main:main
          git tag -a "v$VERSION" -m "Release v$VERSION" "main"
          major="v${VERSION%%.*}"
          git tag -f "$major" "main"
      - name: Tag main-node20
        if: ${{ !inputs.skip_node20 }}
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          git fetch origin main-node20:main-node20
          git tag -a "v$VERSION-node20" -m "Release v$VERSION-node20" "main-node20"
          major="v${VERSION%%.*}-node20"
          git tag -f "$major" "main-node20"
      - name: Push all tags atomically
        run: git push --atomic origin --tags --force

  github-release:
    name: Publish GitHub Release
    needs: [preflight, tag-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract release notes
        id: notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          body=$(./script/extract-release-notes.sh "$VERSION")
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release (node24)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: v${{ needs.preflight.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
      - name: Create GitHub Release (node20)
        if: ${{ !inputs.skip_node20 }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.preflight.outputs.version }}-node20
          name: v${{ needs.preflight.outputs.version }}-node20
          body: |
            Node 20 runtime variant of v${{ needs.preflight.outputs.version }}. Source is identical to `main`; only `action.yml`'s runtime line and `dist/` differ.

            ${{ steps.notes.outputs.body }}
          make_latest: false
